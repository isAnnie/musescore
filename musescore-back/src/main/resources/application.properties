spring.application.name=musescore-back
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/muse_score?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

app.auth.secret=${APP_AUTH_SECRET:replace-this-with-a-strong-secret}
app.auth.expire-seconds=${APP_AUTH_EXPIRE_SECONDS:86400}
